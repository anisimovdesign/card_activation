<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Активация — Split</title>
    <link rel="stylesheet" href="tear-strip/tear-strip.css" />
    <link rel="stylesheet" href="split-envelope/split-envelope.css" />
    <link rel="stylesheet" href="activation/activation.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        overflow-x: clip;
        background: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        height: 100svh;
      }

      /* Desktop demo frame */
      @media (min-width: 768px) {
        body {
          display: grid;
          place-items: center;
          overflow: auto;
          background: #f5f5f5;
        }

        #app {
          width: auto;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="tear-strip/tear-strip.js"></script>
    <script src="split-envelope/split-envelope.js"></script>
    <script src="activation/activation.js"></script>
    <script>
      ActivationScreen.create(document.getElementById('app'), {
        envelope: {
          width: 343,
          height: 221,
          tearBottom: 39,
          stripOptions: {
            animationMode: 'scatter',
            color: '#19CA41',
          },
        },
      });
    </script>
  </body>
</html>
