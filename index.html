<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Активация — Split</title>
    <link rel="stylesheet" href="tear-strip/tear-strip.css" />
    <link rel="stylesheet" href="split-envelope/split-envelope.css" />
    <link rel="stylesheet" href="activation/activation.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .demo {
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      @media (max-width: 480px) {
        html,
        body {
          height: 100%;
          overflow: hidden;
        }

        body {
          display: block;
          background: #fff;
        }

        .demo {
          padding: 0;
          width: 100%;
          height: 100%;
          height: 100dvh;
        }

        #app {
          width: 100%;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <div id="app"></div>
    </div>

    <script src="tear-strip/tear-strip.js"></script>
    <script src="split-envelope/split-envelope.js"></script>
    <script src="activation/activation.js"></script>
    <script>
      ActivationScreen.create(document.getElementById('app'), {
        envelope: {
          width: 343,
          height: 221,
          tearBottom: 39,
          stripOptions: {
            animationMode: 'scatter',
            color: '#19CA41',
          },
        },
      });
    </script>
  </body>
</html>
